<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mamma's lucky spin 💖</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff69b4">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Centering & Background */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevents accidental scrolling */
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #fff0f5;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;  
            text-align: center;
        }

        /* Decorative Background Images */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            pointer-events: none;
        }

        .bg-img {
            position: absolute;
            width: 70px;      
            opacity: 0.25;    
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.05));
        }

        .pos1 { top: 8%;  left: 8%;  transform: rotate(-15deg); }
        .pos2 { top: 12%; right: 8%; transform: rotate(20deg); }
        .pos3 { bottom: 20%; left: 10%; transform: rotate(10deg); }
        .pos4 { bottom: 15%; right: 10%; transform: rotate(-25deg); }
        .pos5 { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(3); opacity: 0.08; }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff1493;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        /* The Spin Wheel */
        #container {
            width: 85%;
            max-width: 400px;  
            height: 150px; 
            overflow: hidden;
            border: 8px solid #ff69b4;
            border-radius: 25px;
            background: white;
            position: relative;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.3);
        }

        #list {
            position: absolute;
            width: 100%;
            transition: transform 0.1s linear;
        }

        .item {
            height: 50px;
            line-height: 50px;
            font-size: 22px;
            font-weight: 500;
        }

        #highlight {
            position: absolute;
            top: 50px; /* Centered in the 150px height box */
            width: 100%;
            height: 50px;
            border-top: 3px solid #ff1493;
            border-bottom: 3px solid #ff1493;
            pointer-events: none;
            background: rgba(255, 20, 147, 0.05);
        }

        button {
            padding: 18px 45px;
            font-size: 22px;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        #result {
            margin-top: 25px;
            min-height: 40px; 
            font-size: 26px;
            font-weight: bold;
            color: #ff1493;
        }

        /* WhatsApp Button */
        #whatsapp-btn {
            display: none;
            margin-top: 20px;
            background-color: #25D366;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body>

<div class="bg-layer">
    <img src="mammanienie1.jpg" class="bg-img pos1" onerror="this.style.display='none'">
    <img src="mammanienie2.jpg" class="bg-img pos2" onerror="this.style.display='none'">
    <img src="mammanienie3.jpg" class="bg-img pos3" onerror="this.style.display='none'">
    <img src="mammanienie4.jpg" class="bg-img pos4" onerror="this.style.display='none'">
    <img src="mammanienie5.jpg" class="bg-img pos5" onerror="this.style.display='none'">
</div>

<script>
const options = [
    "Do the dishes 🍽️", "Big hug 🤗", "Clean the kitchen 🧼", 
    "Make tea ☕", "Sweet note 💌", "Help with chores 🧹", 
    "Movie night 🎬", "Number of kisses 💖", "Belly Button 🤮", "Squeeze 🧽"
];

const list = document.getElementById("list");
const itemHeight = 50; 

// We use a larger multiplier for the list to ensure we never "run out" of items during a fast spin
const fullList = [...options, ...options, ...options, ...options, ...options, ...options];

fullList.forEach(text => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = text;
    list.appendChild(div);
});

let position = 0;
let spinning = false;

// Audio Setup
const tickSoundURL = "https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3";
const customMusic = new Audio("audioformamma.mp3");
const winSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3");
const tickPool = Array.from({ length: 8 }, () => new Audio(tickSoundURL));

customMusic.loop = true;
customMusic.volume = 0.3;

function playTick() {
    const t = tickPool.find(audio => audio.paused) || tickPool[0];
    t.currentTime = 0;
    t.volume = 0.5;
    t.play().catch(() => {});
    if (navigator.vibrate) navigator.vibrate(10);
}

function start() {
    if (spinning) return;
    spinning = true;
    
    document.getElementById("result").innerText = "";
    document.getElementById("whatsapp-btn").style.display = "none";
    
    customMusic.play().catch(() => {});

    // --- SMOOTH SPIN LOGIC ---
    let speed = 30 + Math.random() * 15; // Higher initial burst
    const friction = 0.985; // How fast it slows down (0.99 = slow stop, 0.95 = fast stop)
    const minSpeed = 0.2;

    function step() {
        position += speed;
        speed *= friction; // Gradual deceleration

        const totalHeight = options.length * itemHeight;
        if (position >= totalHeight) position %= totalHeight;

        // Visual update using translate3d for Hardware Acceleration (Smoother!)
        list.style.transform = `translate3d(0, -${position}px, 0)`;

        // Tick sound logic
        if (Math.floor(position / itemHeight) !== Math.floor((position - speed) / itemHeight)) {
            playTick();
        }

        if (speed > minSpeed) {
            requestAnimationFrame(step);
        } else {
            finish();
        }
    }
    
    requestAnimationFrame(step);
}

function finish() {
    // Snap to center
    position = Math.round(position / itemHeight) * itemHeight;
    list.style.transform = `translate3d(0, -${position}px, 0)`;

    // Calculate index based on the center highlight box
    const index = (Math.round((position + itemHeight) / itemHeight)) % options.length;
    const choice = options[index];

    document.getElementById("result").innerText = "You got: " + choice;
    
    winSound.currentTime = 0;
    winSound.play().catch(() => {});
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

    const waBtn = document.getElementById("whatsapp-btn");
    waBtn.style.display = "inline-block";
    waBtn.onclick = (e) => {
        e.preventDefault();
        const myNumber = "YOUR_NUMBER"; // Replace with your number!
        const msg = encodeURIComponent(`Hi! I won: ${choice}! 💖`);
        window.open(`https://wa.me/${myNumber}?text=${msg}`, '_blank');
    };

    spinning = false;
}
    if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Service Worker Registered"))
      .catch(err => console.log("Service Worker Failed", err));
  }
</script>
</body>
</html>
