<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mamma's lucky spin 💖</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff69b4">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  body {
    font-family: Arial, sans-serif;
    background: #fff0f5;
    text-align: center;
  }

  h1 {
    margin-top: 30px;
  }

  #container {
    margin: 40px auto;
    width: 90%;
    max-width: 500px; 
    height: 150px; /* Taller box */
    overflow: hidden;
    border: 8px solid #ff69b4; /* Thicker border for better look */
    border-radius: 20px;
    background: white;
    position: relative;
    box-shadow: 0 10px 20px rgba(255, 105, 180, 0.2); /* Soft glow */
  }

  #list {
    position: absolute;
    width: 100%;
  }

  .item {
    height: 50px;
    line-height: 50px;
    font-size: 24px;
  }

  #highlight {
    position: absolute;
    top: 50px;
    width: 100%;
    height: 50px;
    border-top: 3px solid red;
    border-bottom: 3px solid red;
    pointer-events: none;
    background: rgba(255, 0, 0, 0.05);
  }

  button {
    padding: 15px 40px;
    font-size: 22px;
    background: #ff69b4;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    margin-top: 20px;
  }

  #result {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
  }
</style>
</head>

<body>

<h1>Pick a Surprise 💝</h1>

<div id="container">
  <div id="list"></div>
  <div id="highlight"></div>
</div>

<button onclick="start()">Pick 🎰</button>

<div id="result"></div>

<script>
const options = [
  "Do the dishes 🍽️",
  "Big hug 🤗",
  "Clean the kitchen 🧼",
  "Make tea ☕",
  "Sweet note 💌",
  "Help with chores 🧹",
  "Movie night 🎬",
  "Number of kisses 💖",
  "Belly Button 🤮",
  "Squeeze 🧽"
];

const list = document.getElementById("list");
const itemHeight = 50; 

const fullList = [...options, ...options, ...options];
fullList.forEach(text => {
  const div = document.createElement("div");
  div.className = "item";
  div.innerText = text;
  list.appendChild(div);
});

let position = 0;
let speed = 20;
let spinning = false;

// --- AUDIO SETUP ---
const tickSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");
const customMusic = new Audio("audioformamma.mp3");
const winSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3");

// PRELOAD & VOLUME TUNING
customMusic.preload = 'auto';
customMusic.loop = true; // Keeps music going if it's short
customMusic.volume = 0.4; // Lowered so other sounds pop through

tickSound.preload = 'auto';
tickSound.volume = 1.0; // Max volume for the tick

winSound.preload = 'auto';
winSound.volume = 1.0; // Max volume for the celebration

function start() {
  if (spinning) return;
  spinning = true;
  document.getElementById("result").innerText = ""; 

  // Start music if it's not already playing
  customMusic.play().catch(e => console.log("Music play blocked:", e));

  speed = 25;
  let duration = 2000 + Math.random() * 2000; 
  let startTime = Date.now();

  function animate() {
    position += speed;
    const totalHeight = options.length * itemHeight;

    if (position >= totalHeight) {
      position = position % totalHeight;
    }

    list.style.transform = `translateY(-${position}px)`;

    // Play tick sound logic
    if (Math.random() < 0.2) {
      const t = tickSound.cloneNode(); // Allows overlapping ticks
      t.volume = 0.6;
      t.play().catch(() => {}); 
    }

    let elapsed = Date.now() - startTime;
    if (elapsed > duration) {
      speed *= 0.95;
    }

    if (speed > 0.5) {
      requestAnimationFrame(animate);
    } else {
      finish();
    }
  }

  animate();
}

function finish() {
  // customMusic.pause(); // REMOVED so music keeps playing
  
  // Play the celebration pop!
  winSound.currentTime = 0;
  winSound.play().catch(e => console.log("Win sound blocked:", e));

  const centerOffset = itemHeight; 
  const adjustedPosition = position + centerOffset;
  const index = Math.floor(adjustedPosition / itemHeight) % options.length;

  const choice = options[index];
  document.getElementById("result").innerText = "You got: " + choice;

  spinning = false;

  position = Math.round(position / itemHeight) * itemHeight;
  list.style.transform = `translateY(-${position}px)`;
}
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
