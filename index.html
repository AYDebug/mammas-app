<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mamma's lucky spin 💖</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff69b4">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  /* This centers everything perfectly in the middle of the screen */
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Arial, sans-serif;
    background: #fff0f5;
    display: flex;
    flex-direction: column;
    justify-content: center; /* Vertical centering */
    align-items: center;     /* Horizontal centering */
    text-align: center;
  }

  h1 {
    margin: 0 0 20px 0; /* Space below the title */
  }

  #container {
    width: 90%;
    max-width: 500px;  
    height: 150px; 
    overflow: hidden;
    border: 8px solid #ff69b4;
    border-radius: 20px;
    background: white;
    position: relative;
    box-shadow: 0 10px 20px rgba(255, 105, 180, 0.2);
  }

  #list {
    position: absolute;
    width: 100%;
  }

  .item {
    height: 50px;
    line-height: 50px;
    font-size: 24px;
  }

  #highlight {
    position: absolute;
    top: 50px;
    width: 100%;
    height: 50px;
    border-top: 3px solid red;
    border-bottom: 3px solid red;
    pointer-events: none;
    background: rgba(255, 0, 0, 0.05);
  }

  button {
    padding: 15px 40px;
    font-size: 22px;
    background: #ff69b4;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    margin-top: 30px;
  }

  #result {
    margin-top: 25px;
    min-height: 30px; 
    font-size: 24px;
    font-weight: bold;
    color: #ff1493;
  }
</style>
</head>

<body>

<h1>Pick a Surprise 💝</h1>

<div id="container">
  <div id="list"></div>
  <div id="highlight"></div>
</div>

<button onclick="start()">Pick 🎰</button>

<div id="result"></div>

<script>
const options = [
  "Do the dishes 🍽️", "Big hug 🤗", "Clean the kitchen 🧼", 
  "Make tea ☕", "Sweet note 💌", "Help with chores 🧹", 
  "Movie night 🎬", "Number of kisses 💖", "Belly Button 🤮", "Squeeze 🧽"
];

const list = document.getElementById("list");
const itemHeight = 50; 

const fullList = [...options, ...options, ...options];
fullList.forEach(text => {
  const div = document.createElement("div");
  div.className = "item";
  div.innerText = text;
  list.appendChild(div);
});

let position = 0;
let speed = 20;
let spinning = false;

// --- AUDIO SETUP ---
const tickSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");
const customMusic = new Audio("audioformamma.mp3");
const winSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3");

customMusic.preload = 'auto';
customMusic.loop = true; 
customMusic.volume = 0.4; 

function start() {
  if (spinning) return;
  spinning = true;
  document.getElementById("result").innerText = ""; 

  customMusic.play().catch(() => {});

  speed = 25;
  let duration = 2000 + Math.random() * 2000; 
  let startTime = Date.now();

  function animate() {
    position += speed;
    const totalHeight = options.length * itemHeight;

    if (position >= totalHeight) {
      position = position % totalHeight;
    }

    list.style.transform = `translateY(-${position}px)`;

    if (Math.random() < 0.25) {
      const t = tickSound.cloneNode();
      t.volume = 1.0; 
      t.play().catch(() => {}); 
    }

    let elapsed = Date.now() - startTime;
    if (elapsed > duration) {
      speed *= 0.95;
    }

    if (speed > 0.5) {
      requestAnimationFrame(animate);
    } else {
      finish();
    }
  }

  animate();
}

function finish() {
  position = Math.round(position / itemHeight) * itemHeight;
  list.style.transform = `translateY(-${position}px)`;

  const redBoxOffset = itemHeight; 
  const winningPosition = position + redBoxOffset;
 
  const index = Math.round(winningPosition / itemHeight) % options.length;

  const choice = options[index];
  document.getElementById("result").innerText = "You got: " + choice;
  
  winSound.currentTime = 0;
  winSound.play().catch(() => {});
  
  spinning = false;
}
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
